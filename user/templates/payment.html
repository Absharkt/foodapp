{% extends "form.html" %}
{% block content %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/payment.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/d37084c1c8.js" crossorigin="anonymous"></script>

</head>
<body>
    

    <div class="container bg-light p-4">
        <div>
            <h2>Payment Information</h2>
            <h5 class="font-weight-bold">Enter credit card information below and click submit</h5>
        </div>

        <div class="mt-5 ml-5 pay">
            <table class="table">
                <thead>
                  <tr>
                    <th scope="col">Credit card accepted :</th>
                    <th scope="col">
                        <input type="radio">
                        <label for="">Visa</label>

                        <input type="radio">
                        <label for="">Mastercard</label>

                        <input type="radio">
                        <label for="">Discover</label>

                        <input type="radio">
                        <label for="">Visa</label>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <th scope="row">Card Number :</th>
                    <td><input type="text"></td>
                  </tr>
                  <tr>
                    <th scope="row">Expiry date :</th>
                    <td><input type="date"></td>
                  </tr>
                  <tr>
                    <th scope="row">Name on card :</th>
                    <td><input type="text"></td>
                  </tr>
                  <tr>
                    <th scope="row">Country :</th>
                    <td>
                        <select name="" id="">
                            <option value="">India</option>
                        </select>
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">Address :</th>
                    <td><input type="text"></td>
                  </tr>
                  <tr>
                    <th scope="row">City :</th>
                    <td>
                        <select name="" id="">
                            <option value="">Select</option>
                        </select>
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">Pin :</th>
                    <td><input type="text"></td>
                  </tr>
                  <tr>
                    <th scope="row">Phone :</th>
                    <td><input type="text"></td>
                  </tr>
                  <tr>
                    <th scope="row">E-mail :</th>
                    <td><input type="email"></td>
                  </tr>
                </tbody>
              </table>

              <button type="button" class="btn btn-success w-25 mt-5 paybut">Pay </button>
        </div>
    </div>


</body>
</html>

{% endblock %}
