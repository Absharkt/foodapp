{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/d37084c1c8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/dcsignup.css' %}">
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">

</head>
<body>
    
    <div class="main">
        <div class="left">
            <img src="{% static 'images/loginside.jpg' %}" alt="">
            <div id="overlay"></div>

        </div>

        <div class="right">
            <div class="cover">
                <div class="box">
                    <h1>Sign Up</h1>
                    <form action="">
                        <div class="inp">
                            <input type="text" placeholder="First Name">
                            <input type="text" placeholder="Last Name">
                        </div>
                        <div class="inp">
                            <input class="inp2" type="email" placeholder="E-mail">
                        </div>
                        <div class="inp">
                            <input type="password" placeholder="Password">
                            <input type="password" placeholder="Confirm Password">
                        </div>
                        <button>Sign Up</button>
                    </form>
                    <h4>Already have an account  <a href="{% url 'login' %}">Login</a></h4>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
